<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Super Admin{% endblock %} — AI Center</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .admin-sidebar { background: #0d1117; }
    .admin-sidebar .sidebar-header { border-bottom: 1px solid rgba(255,255,255,0.08); }
    .admin-sidebar .sidebar-logo { background: linear-gradient(135deg,#f59e0b,#ef4444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-sidebar .sidebar-link { color: #94a3b8; }
    .admin-sidebar .sidebar-link:hover { color: #f8fafc; background: rgba(255,255,255,0.06); }
    .admin-sidebar .sidebar-link.active { background: rgba(245,158,11,0.18); color: #f59e0b; border-left: 3px solid #f59e0b; }
    .admin-badge { background: linear-gradient(135deg,#f59e0b,#ef4444); color: #fff; font-size:.65rem; padding:.15rem .4rem; border-radius:6px; font-weight:700; vertical-align:middle; letter-spacing:.03em; }
    .admin-topbar { background: #0d1117; border-bottom: 1px solid rgba(245,158,11,0.2); }
    .admin-topbar .topbar-title { color: #f8fafc; }
    .stat-card-admin { background: var(--card-bg); border-radius: 12px; padding: 1.2rem 1.4rem; box-shadow: var(--shadow); height: 100%; border-left: 4px solid transparent; }
    .stat-card-admin.orange { border-left-color: #f59e0b; }
    .stat-card-admin.green  { border-left-color: #10b981; }
    .stat-card-admin.blue   { border-left-color: #3b82f6; }
    .stat-card-admin.red    { border-left-color: #ef4444; }
    .stat-card-admin.purple { border-left-color: #8b5cf6; }
    .tenant-row:hover { background: rgba(245,158,11,0.04); }
    .bot-running  { color: #10b981; }
    .bot-stopped  { color: #6b7280; }
    .bot-error    { color: #ef4444; }
    .bot-starting { color: #f59e0b; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <nav class="sidebar admin-sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">⚙️</span>
      <span class="sidebar-title" style="color:#f8fafc">Super Admin</span>
      <button class="btn-close-sidebar d-md-none" id="closeSidebar"><i class="bi bi-x-lg" style="color:#fff"></i></button>
    </div>
    <ul class="sidebar-nav">
      <li><a href="/admin" class="sidebar-link {% if request.url.path == '/admin' or request.url.path == '/admin/' %}active{% endif %}"><i class="bi bi-speedometer2"></i> Tổng quan</a></li>
      <li><a href="/admin/tenants" class="sidebar-link {% if '/admin/tenants' in request.url.path %}active{% endif %}"><i class="bi bi-people-fill"></i> Khách thuê</a></li>
      <li><a href="/admin/plans" class="sidebar-link {% if '/admin/plans' in request.url.path %}active{% endif %}"><i class="bi bi-layers"></i> Gói thuê</a></li>
    </ul>
    <div class="sidebar-footer" style="border-top:1px solid rgba(255,255,255,0.08)">
      <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode"><i class="bi bi-moon-fill" style="color:#94a3b8"></i></button>
      <a href="/" class="btn btn-sm btn-outline-warning ms-2"><i class="bi bi-arrow-left"></i> Về cửa hàng</a>
    </div>
  </nav>

  <div class="main-content">
    <header class="topbar admin-topbar">
      <button class="hamburger d-md-none" id="sidebarToggle"><i class="bi bi-list" style="color:#f8fafc"></i></button>
      <span class="topbar-title">{% block page_title %}Super Admin{% endblock %} <span class="admin-badge">OWNER</span></span>
      <div class="topbar-right">
        <form action="/logout" method="post" style="display:inline">
          <button class="btn btn-sm btn-outline-danger"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button>
        </form>
      </div>
    </header>

    {% if flash %}
    <div class="flash-container">
      <div class="alert alert-{{ 'success' if flash.type == 'success' else 'danger' }} alert-dismissible fade show flash-msg" role="alert">
        {{ flash.msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    </div>
    {% endif %}

    <div class="content-area">
      {% block content %}{% endblock %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
